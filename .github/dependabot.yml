# Dependabot keeps the pinned CI actions and dev Python deps current.
# Inspection finding S08.10.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    # Only requirements-dev.txt exists; runtime tooling is stdlib-only.
