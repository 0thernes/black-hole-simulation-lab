name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate and test (windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: pip install lxml jsonschema

      - name: Rebuild brain corpus
        run: python scripts/brains/build_brains.py

      - name: Rebuild source-card corpus
        run: python scripts/research/build_source_cards.py

      - name: Corpus drift gate
        # Generators are deterministic (dates come from the seed JSON), so
        # regeneration must be byte-identical to the committed artifacts.
        # A diff here means someone edited generated files by hand or
        # committed a seed change without regenerating - both are errors.
        run: git diff --exit-code

      - name: Validate Research OS
        run: python scripts/Validate-ResearchOS.py

      - name: Validate brain corpus
        run: python scripts/brains/validate_brains.py

      - name: Validate source-card corpus
        run: python scripts/research/validate_source_cards.py

      - name: CMake configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build --config Release

      - name: CTest
        run: ctest --test-dir build -C Release --output-on-failure
