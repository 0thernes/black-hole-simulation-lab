name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

# Opt into Node.js 24 for JS-based actions (Node 20 is deprecated on
# GitHub-hosted runners). Keeps the pinned action majors working past the
# Node 20 removal date without guessing at newer action versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install clang-format (pinned)
        # Pin the exact version the code was formatted with so the check
        # cannot fail on cross-version reflow differences. The pip wheel is
        # platform-independent, unlike the apt package whose version drifts.
        run: pip install "clang-format==19.1.7"

      - name: Check C++ formatting
        run: |
          files=$(git ls-files '*.hpp' '*.cpp')
          echo "Checking formatting of:"
          echo "$files"
          clang-format --dry-run --Werror $files

  validate:
    name: Validate corpora and gates
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: pip install -r requirements-dev.txt

      - name: Rebuild brain corpus
        run: python scripts/brains/build_brains.py

      - name: Rebuild source-card corpus
        run: python scripts/research/build_source_cards.py

      - name: Corpus drift gate
        # Deterministic generators must reproduce the committed artifacts
        # byte-for-byte. A diff means a hand-edited generated file or a
        # seed change committed without regenerating.
        run: git diff --exit-code

      - name: Validate Research OS
        run: python scripts/Validate-ResearchOS.py

      - name: Validate brain corpus
        run: python scripts/brains/validate_brains.py

      - name: Validate source-card corpus
        run: python scripts/research/validate_source_cards.py

  build:
    name: Build and test (${{ matrix.config }})
    runs-on: windows-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: CMake build
        run: cmake --build build --config ${{ matrix.config }}

      - name: CTest
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure
